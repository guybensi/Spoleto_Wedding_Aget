services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: spoleto-openclaw
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENCLAW_CONFIG_PATH: /app/openclaw/openclaw.json5
      OPENCLAW_WORKSPACE: /app/workspace
    volumes:
      - ./openclaw:/app/openclaw:ro
      - ./workspace:/app/workspace:ro
      - ./prompts:/app/prompts:ro
      - ./data:/app/data
      - openclaw-state:/root/.openclaw

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spoleto-ingestion
    restart: "no"
    env_file:
      - .env
    command:
      [
        "spoleto-ingest",
        "--input-dir",
        "/app/data/raw/images",
        "--output-dir",
        "/app/data/processed",
        "--provider",
        "mock",
      ]
    volumes:
      - ./data:/app/data
      - ./services:/app/services
      - ./tests:/app/tests:ro
      - ./prompts:/app/prompts:ro
      - ./workspace:/app/workspace

volumes:
  openclaw-state:
